task_name: column_relation_prediction
task_type: classification

head:
  type: mlp
  input_dim: auto
  output_dim: auto
  hidden_dim: 256
  num_layers: 2
  activation: relu
  dropout: 0.1
  dropout_first: false

training:
  backend: pytorch

  optimizer:
    type: adamw
    lr: 1.0e-3
    weight_decay: 0

  scheduler:
    type: none

  loss:
    type: bce_with_logits

  batch_size: 32
  max_epochs: 20
  seed: 42
  device: auto
  deterministic: true
  eval_test_every_epoch: false

  checkpointing:
    monitor: val_micro_f1
    mode: max
    save_per_epoch: false

  logging:
    wandb: false

evaluation:
  metrics: [micro_f1, macro_f1]
  threshold: 0.5
