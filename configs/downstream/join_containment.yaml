task_name: join_containment
task_type: regression

head:
  type: mlp
  input_dim: auto
  output_dim: 1
  hidden_dim: 256
  num_layers: 2
  activation: relu
  dropout: 0.1
  dropout_first: false

training:
  backend: pytorch
  combination_method: concat

  optimizer:
    type: adamw
    lr: 1.0e-3
    weight_decay: 0

  scheduler:
    type: none

  loss:
    type: mse

  batch_size: 2048
  max_epochs: 50
  seed: 42
  device: auto
  deterministic: true

  early_stopping:
    monitor: val_loss
    patience: 15
    mode: min

  checkpointing:
    monitor: val_loss
    mode: min
    save_per_epoch: false

  logging:
    wandb: false

evaluation:
  metrics: [mse, r2, mae]
  threshold: 0.5
