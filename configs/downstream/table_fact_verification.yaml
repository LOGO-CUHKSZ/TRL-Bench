task_name: table_fact_verification
task_type: classification

head:
  type: mlp
  input_dim: auto
  output_dim: 2
  hidden_dim: 256
  num_layers: 2
  activation: relu
  dropout: 0.1
  dropout_first: false
  # Interaction head config (only used when head_type == interaction)
  projection_dim: 256
  interaction_type: full
  normalize_projection: true
  classifier_hidden_dim: 256

training:
  backend: pytorch
  combination_method: concat

  optimizer:
    type: adamw
    lr: 1.0e-3
    weight_decay: 0

  scheduler:
    type: none

  loss:
    type: cross_entropy

  batch_size: 32
  max_epochs: 50
  seed: 42
  device: auto
  deterministic: true

  early_stopping:
    monitor: val_loss
    patience: 15
    mode: min

  checkpointing:
    monitor: val_loss
    mode: min
    save_per_epoch: false

  logging:
    wandb: false

evaluation:
  metrics: [accuracy, macro_f1, auroc]
  threshold: 0.5
